name: Simple CI Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Print Message
        run: echo "Hello, CI/CD Pipeline Running!"

      - name: Check Node Version
        run: node -v
